name: Build vLLM Docker Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile  # ← Используем ОРИГИНАЛЬНЫЙ Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vllm-36735fd-fp8:latest
          build-args: |
            PYTORCH_NIGHTLY=1  # ← Это ЕСТЬ в оригинальном Dockerfile как ARG
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: vllm-openai  # ← target из оригинального Dockerfile
