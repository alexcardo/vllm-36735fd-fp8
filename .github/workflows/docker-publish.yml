name: Build vLLM

on:
  workflow_dispatch: # Чтобы появилась кнопка ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vllm-custom:36735fd .
          docker push ${{ secrets.DOCKER_USERNAME }}/vllm-custom:36735fd
