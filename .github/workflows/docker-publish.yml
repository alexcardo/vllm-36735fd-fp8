name: Build vLLM

on:
  workflow_dispatch: # Появится кнопка "Run workflow" в Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Используем твои точные названия из настроек
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          # Собираем образ и пушим его
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/vllm-custom:36735fd .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/vllm-custom:36735fd
