name: Build vLLM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space # vLLM требует много места, очистим лишнее
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          # MAX_JOBS=1 спасет от падения по памяти (Out of Memory)
          docker build \
            --build-arg MAX_JOBS=1 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/vllm-custom:36735fd .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/vllm-custom:36735fd
